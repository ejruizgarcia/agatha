<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Mysteries of Agatha Christie</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    body {
      box-sizing: border-box;
      background-color: #1a2520;
    }
    
    * {
      font-family: 'Crimson Text', serif;
    }
    
    .title-font {
      font-family: 'Playfair Display', serif;
    }
    
    .game-board {
      background: 
        linear-gradient(rgba(20, 30, 25, 0.95), rgba(20, 30, 25, 0.95)),
        repeating-linear-gradient(0deg, transparent, transparent 50px, rgba(139, 90, 43, 0.1) 50px, rgba(139, 90, 43, 0.1) 51px),
        repeating-linear-gradient(90deg, transparent, transparent 50px, rgba(139, 90, 43, 0.1) 50px, rgba(139, 90, 43, 0.1) 51px);
      background-color: #1a2520;
      min-height: max(100vh, 56.25vw);
    }
    
    .card {
      perspective: 1000px;
      transform-style: preserve-3d;
    }
    
    .card-inner {
      transition: transform 0.6s;
      transform-style: preserve-3d;
    }
    
    .card-front, .card-back {
      backface-visibility: hidden;
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 8px;
    }
    
    .card-back {
      transform: rotateY(180deg);
    }
    
    .card-flipped .card-inner {
      transform: rotateY(180deg);
    }
    
    @keyframes shuffle {
      0%, 100% { transform: translateX(0) rotate(0deg); }
      25% { transform: translateX(-10px) rotate(-5deg); }
      50% { transform: translateX(10px) rotate(5deg); }
      75% { transform: translateX(-5px) rotate(-2deg); }
    }
    
    @keyframes dealCardSmooth {
      0% { 
        opacity: 0;
        transform: translateY(-150px) rotate(-25deg) scale(0.2);
      }
      100% { 
        opacity: 1;
        transform: translateY(0) rotate(0deg) scale(1);
      }
    }
    
    .shuffling {
      animation: shuffle 0.3s ease-in-out infinite;
    }
    
    .deck-stack {
      box-shadow: 
        2px 2px 0 rgba(0,0,0,0.3),
        4px 4px 0 rgba(0,0,0,0.25),
        6px 6px 0 rgba(0,0,0,0.2),
        8px 8px 0 rgba(0,0,0,0.15);
    }
    
    .vintage-border {
      border: 3px solid #8B5A2B;
      box-shadow: 
        inset 0 0 20px rgba(139, 90, 43, 0.3),
        0 0 15px rgba(0, 0, 0, 0.5);
    }
    
    .gold-text {
      color: #D4AF37;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to { opacity: 1; transform: scale(1); }
    }
    
    .fade-in {
      animation: fadeIn 0.5s ease-out;
    }
    
    .modal-backdrop {
      background: rgba(0, 0, 0, 0.85);
    }
    
    .parchment-bg {
      background: linear-gradient(135deg, #f5e6d3 0%, #e8d5b7 50%, #d4c4a8 100%);
    }
    
    .card-category-1 { background: linear-gradient(145deg, #2c1810 0%, #4a2c1a 100%); }
    .card-category-2 { background: linear-gradient(145deg, #1a2c28 0%, #2a4a42 100%); }
    .card-category-3 { background: linear-gradient(145deg, #2c1a28 0%, #4a2a42 100%); }
    .card-category-4 { background: linear-gradient(145deg, #28281a 0%, #42422a 100%); }
    .card-category-5 { background: linear-gradient(145deg, #1a1a2c 0%, #2a2a4a 100%); }
    .card-category-6 { background: linear-gradient(145deg, #2c0a0a 0%, #4a1a1a 100%); }
  </style>
</head>
<body class="min-h-screen overflow-auto text-white">
  <div id="app" class="min-h-screen w-full">
    
    <!-- Title Screen -->
    <div id="titleScreen" class="w-full flex flex-col items-center justify-center p-8 game-board">
      <div class="text-center fade-in">
        <div class="mb-8">
          <svg class="w-24 h-24 mx-auto mb-6 gold-text" viewBox="0 0 100 100" fill="currentColor">
            <path d="M50 5 L60 35 L95 35 L67 55 L78 90 L50 70 L22 90 L33 55 L5 35 L40 35 Z" stroke="#8B5A2B" stroke-width="2" /> 
            <circle cx="50" cy="50" r="15" fill="none" stroke="currentColor" stroke-width="2" /> 
            <text x="50" y="55" text-anchor="middle" font-size="14" fill="currentColor">?</text>
          </svg>
        </div>
        <h1 id="mainTitle" class="title-font text-5xl md:text-7xl font-bold gold-text mb-4 tracking-wide">The Mysteries of Agatha Christie</h1>
        <p id="subtitle" class="text-2xl md:text-3xl text-amber-200 mb-12 italic">Novel Ingredients</p>
        <button id="startBtn" class="px-12 py-4 bg-gradient-to-b from-amber-700 to-amber-900 text-amber-100 text-xl title-font rounded-lg vintage-border hover:from-amber-600 hover:to-amber-800 transition-all transform hover:scale-105"> Begin the Mystery </button>
      </div>
      <div class="mt-12 flex flex-wrap justify-center gap-4">
        <div class="w-16 h-24 bg-amber-900 rounded-lg deck-stack opacity-50"></div>
        <div class="w-16 h-24 bg-emerald-900 rounded-lg deck-stack opacity-50"></div>
        <div class="w-16 h-24 bg-purple-900 rounded-lg deck-stack opacity-50"></div>
        <div class="w-16 h-24 bg-yellow-900 rounded-lg deck-stack opacity-50"></div>
        <div class="w-16 h-24 bg-blue-900 rounded-lg deck-stack opacity-50"></div>
      </div>
    </div>

    <!-- Team Setup Screen -->
    <div id="setupScreen" class="hidden w-full flex flex-col items-center justify-center p-8 game-board">
      <div class="w-full max-w-lg parchment-bg rounded-xl p-8 vintage-border fade-in">
        <h2 class="title-font text-3xl font-bold text-amber-900 text-center mb-8">Gather the Suspects</h2>
        <div class="mb-6">
          <label class="block text-amber-900 text-lg mb-2 font-semibold">Number of Teams</label> 
          <select id="teamCount" class="w-full p-3 bg-amber-50 border-2 border-amber-700 rounded-lg text-amber-900 text-lg focus:outline-none focus:border-amber-500"> 
            <option value="2">2 Teams</option> 
            <option value="3">3 Teams</option> 
            <option value="4">4 Teams</option> 
            <option value="5">5 Teams</option> 
            <option value="6">6 Teams</option> 
            <option value="7">7 Teams</option> 
          </select>
        </div>
        <div id="teamNamesContainer" class="space-y-4 mb-8"></div>
        <button id="confirmTeamsBtn" class="w-full py-4 bg-gradient-to-b from-amber-700 to-amber-900 text-amber-100 text-xl title-font rounded-lg hover:from-amber-600 hover:to-amber-800 transition-all"> Confirm Teams </button>
      </div>
    </div>

    <!-- Game Board Screen -->
    <div id="gameScreen" class="hidden w-full game-board flex flex-col items-center justify-center p-8">
      <!-- Header -->
      <div class="text-center mb-12">
        <h2 class="title-font text-3xl md:text-4xl gold-text tracking-wider">The Investigation Board</h2>
        <p id="currentTeamDisplay" class="text-amber-200 text-xl mt-4 font-bold tracking-wide"></p>
      </div>
      <!-- Card Decks -->
      <div class="flex flex-wrap justify-center gap-8 mb-12" id="decksContainer" style="width: 100%; max-width: 900px;">
        <!-- Decks will be generated here -->
      </div>
      <!-- Deal Button -->
      <div class="text-center">
        <button id="dealBtn" class="px-12 py-5 bg-gradient-to-b from-red-800 to-red-950 text-amber-100 text-2xl title-font rounded-lg vintage-border hover:from-red-700 hover:to-red-900 transition-all transform hover:scale-105"> 🎴 Deal Cards </button>
      </div>
    </div>

    <!-- Deal Modal -->
    <div id="dealModal" class="hidden fixed inset-0 modal-backdrop flex items-center justify-center p-4 z-50">
      <div class="w-full max-w-7xl rounded-xl p-8 vintage-border max-h-full overflow-auto" id="modalContent" style="background: linear-gradient(135deg, #f5e6d3 0%, #e8d5b7 50%, #d4c4a8 100%);">
        <h3 class="title-font text-3xl md:text-4xl font-bold text-amber-900 text-center mb-6" id="modalTeamName"></h3>
        <p class="text-amber-700 text-center mb-8 italic text-lg">Receiving their mystery ingredients...</p>
        
        <!-- Dealt Cards Area - Horizontal layout -->
        <div class="flex flex-col gap-6 mb-8" id="dealtCardsContainer"></div>
        
        <!-- Action Buttons -->
        <div id="modalButtons" class="flex flex-col sm:flex-row gap-4 justify-center">
          <button id="nextTeamBtn" class="px-8 py-3 bg-gradient-to-b from-amber-700 to-amber-900 text-amber-100 text-lg title-font rounded-lg hover:from-amber-600 hover:to-amber-800 transition-all"> Next Team → </button>
        </div>
      </div>
    </div>

    <!-- Game Complete Modal -->
    <div id="completeModal" class="hidden fixed inset-0 modal-backdrop flex items-center justify-center p-4 z-50">
      <div class="w-full max-w-lg parchment-bg rounded-xl p-8 vintage-border text-center">
        <div class="text-6xl mb-4">🔍</div>
        <h3 class="title-font text-3xl font-bold text-amber-900 mb-4">All Cards Dealt!</h3>
        <p class="text-amber-700 text-lg mb-6">The mystery ingredients have been distributed to all teams. Let the investigation begin!</p>
        <button id="restartBtn" class="px-8 py-3 bg-gradient-to-b from-amber-700 to-amber-900 text-amber-100 text-lg title-font rounded-lg hover:from-amber-600 hover:to-amber-800 transition-all"> Start New Game </button>
      </div>
    </div>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script>
    // Card Data
    const cardData = {
      setting: {
        title: "The Setting",
        subtitle: "Isolation",
        color: "card-category-1",
        cards: [
          { title: "Remote Island", desc: "Surrounded by treacherous waters, no escape possible" },
          { title: "Stuck Transport", desc: "A train or ship halted by mysterious circumstances" },
          { title: "Isolated Mansion", desc: "A grand estate cut off from civilization" },
          { title: "Space Station", desc: "Floating in the void, help is light-years away" },
          { title: "Forest Bus", desc: "Stranded deep in an impenetrable woodland" },
          { title: "Locked Museum", desc: "Trapped among priceless artifacts and secrets" },
          { title: "Sunken Submarine", desc: "Trapped underwater with failing oxygen tanks" }
        ]
      },
      detective: {
        title: "The Detective",
        subtitle: "Outsider",
        color: "card-category-3",
        cards: [
          { title: "Eccentric Intellectual", desc: "Brilliant mind hidden behind peculiar habits" },
          { title: "Harmless Lady", desc: "Underestimated by all, sharp as a blade" },
          { title: "Young Girl", desc: "Fresh perspective, unclouded judgment" },
          { title: "Town Baker", desc: "Trusted by everyone, hears all gossip" },
          { title: "Retired Detective", desc: "Called out of retirement to solve one last case" },
          { title: "Nosy Neighbor", desc: "Always watching from the window with binoculars" },
          { title: "Amateur Podcaster", desc: "Recording every conversation for their true crime show" }
        ]
      },
      redHerrings: {
        title: "False Clues",
        subtitle: "Red Herrings",
        color: "card-category-4",
        cards: [
          { title: "Bright Objects", desc: "Flashy distractions from the truth" },
          { title: "Public Fights", desc: "Loud quarrels meant to mislead" },
          { title: "Secret Lies", desc: "Whispered falsehoods in dark corners" },
          { title: "Muddy Sneakers", desc: "Evidence planted to confuse" },
          { title: "Theater Notes", desc: "Dramatic misdirection scripted carefully" },
          { title: "Forged Letter", desc: "Handwriting expertly mimicked to frame the innocent" },
          { title: "Broken Mirror", desc: "Seven years of bad luck, or a staged struggle?" }
        ]
      },
      realClues: {
        title: "Real Clues",
        subtitle: "Small Details",
        color: "card-category-5",
        cards: [
          { title: "Casual Comments", desc: "Truth slips out in idle conversation" },
          { title: "Silent Dogs", desc: "What doesn't happen reveals all" },
          { title: "Wrong Clocks", desc: "Time itself tells the story" },
          { title: "Left-handedness", desc: "A physical trait that betrays" },
          { title: "Open Windows", desc: "Access points often overlooked" },
          { title: "Torn Fabric", desc: "A thread caught on a hidden nail speaks volumes" },
          { title: "Burnt Letter", desc: "A partially destroyed message in the fireplace" }
        ]
      },
      murder: {
        title: "The Murder",
        subtitle: "The Suspects",
        color: "card-category-2",
        cards: [
          { title: "Loyal Servant", desc: "Devoted to the household, knows all secrets" },
          { title: "Retired Soldier", desc: "Disciplined, haunted by the past" },
          { title: "Innocent Woman", desc: "Seemingly naive, but is she truly?" },
          { title: "Suspicious Stranger", desc: "Arrived unexpectedly, motives unknown" },
          { title: "Smart Influencer", desc: "Modern savvy, always watching" },
          { title: "School Nerd", desc: "Observant intellectual, notices everything" },
          { title: "Grumpy Janitor", desc: "Has access to every locked door" },
          { title: "Wealthy Widow", desc: "Recently inherited a fortune with dark strings attached" }
        ]
      }
    };

    const categoryOrder = ['setting', 'detective', 'redHerrings', 'realClues', 'murder'];
    
    // Game State
    let teams = [];
    let currentTeamIndex = 0;
    let dealtCards = {};
    let usedCards = new Set();
    
    // Default config
    const defaultConfig = {
      main_title: "The Mysteries of Agatha Christie",
      subtitle: "Novel Ingredients",
      background_color: "#1a2520",
      accent_color: "#D4AF37",
      text_color: "#fef3c7",
      button_color: "#78350f",
      card_color: "#451a03"
    };
    
    // DOM Elements
    const titleScreen = document.getElementById('titleScreen');
    const setupScreen = document.getElementById('setupScreen');
    const gameScreen = document.getElementById('gameScreen');
    const dealModal = document.getElementById('dealModal');
    const completeModal = document.getElementById('completeModal');
    
    // Initialize Element SDK (Mocked safely in case it doesn't exist)
    if (window.elementSdk) {
      window.elementSdk.init({
        defaultConfig,
        onConfigChange: async (config) => {
          document.getElementById('mainTitle').textContent = config.main_title || defaultConfig.main_title;
          document.getElementById('subtitle').textContent = config.subtitle || defaultConfig.subtitle;
        },
        mapToCapabilities: (config) => ({
          recolorables: [
            {
              get: () => config.background_color || defaultConfig.background_color,
              set: (value) => window.elementSdk.setConfig({ background_color: value })
            },
            {
              get: () => config.accent_color || defaultConfig.accent_color,
              set: (value) => window.elementSdk.setConfig({ accent_color: value })
            },
            {
              get: () => config.text_color || defaultConfig.text_color,
              set: (value) => window.elementSdk.setConfig({ text_color: value })
            },
            {
              get: () => config.button_color || defaultConfig.button_color,
              set: (value) => window.elementSdk.setConfig({ button_color: value })
            },
            {
              get: () => config.card_color || defaultConfig.card_color,
              set: (value) => window.elementSdk.setConfig({ card_color: value })
            }
          ],
          borderables: [],
          fontEditable: undefined,
          fontSizeable: undefined
        }),
        mapToEditPanelValues: (config) => new Map([
          ["main_title", config.main_title || defaultConfig.main_title],
          ["subtitle", config.subtitle || defaultConfig.subtitle]
        ])
      });
    }
    
    // Event Listeners
    document.getElementById('startBtn').addEventListener('click', () => {
      titleScreen.classList.add('hidden');
      setupScreen.classList.remove('hidden');
      updateTeamInputs();
    });
    
    document.getElementById('teamCount').addEventListener('change', updateTeamInputs);
    
    document.getElementById('confirmTeamsBtn').addEventListener('click', () => {
      const inputs = document.querySelectorAll('.team-name-input');
      teams = Array.from(inputs).map((input, i) => input.value.trim() || `Team ${i + 1}`);
      currentTeamIndex = 0;
      
      setupScreen.classList.add('hidden');
      gameScreen.classList.remove('hidden');
      
      initializeDecks();
      updateCurrentTeamDisplay();
    });
    
    document.getElementById('dealBtn').addEventListener('click', startDealingProcess);
    
    document.getElementById('nextTeamBtn').addEventListener('click', () => {
      currentTeamIndex++;
      
      if (currentTeamIndex >= teams.length) {
        dealModal.classList.add('hidden');
        completeModal.classList.remove('hidden');
      } else {
        usedCards.clear();
        updateCurrentTeamDisplay();
        dealModal.classList.add('hidden'); // Ocultar temporalmente para que el jugador haga click en "Deal" de nuevo
      }
    });
    
    document.getElementById('restartBtn').addEventListener('click', () => {
      completeModal.classList.add('hidden');
      gameScreen.classList.add('hidden');
      titleScreen.classList.remove('hidden');
      teams = [];
      currentTeamIndex = 0;
      dealtCards = {};
      usedCards = new Set();
    });
    
    function updateTeamInputs() {
      const count = parseInt(document.getElementById('teamCount').value);
      const container = document.getElementById('teamNamesContainer');
      container.innerHTML = '';
      
      for (let i = 0; i < count; i++) {
        const div = document.createElement('div');
        div.innerHTML = `
          <label class="block text-amber-900 mb-1 font-semibold">Team ${i + 1} Name</label>
          <input type="text" class="team-name-input w-full p-3 bg-amber-50 border-2 border-amber-700 rounded-lg text-amber-900 focus:outline-none focus:border-amber-500" placeholder="Enter team name...">
        `;
        container.appendChild(div);
      }
    }
    
    function initializeDecks() {
      const container = document.getElementById('decksContainer');
      container.innerHTML = '';
      
      categoryOrder.forEach(catKey => {
        const category = cardData[catKey];
        const deckDiv = document.createElement('div');
        deckDiv.className = 'flex flex-col items-center';
        deckDiv.innerHTML = `
          <div class="deck-wrapper relative mb-2" data-category="${catKey}">
            <div class="w-20 h-28 md:w-24 md:h-32 ${category.color} rounded-lg deck-stack cursor-pointer border-2 border-amber-600 flex items-center justify-center">
              <div class="text-center p-1">
                <div class="text-amber-200 text-xs font-bold title-font">${category.title}</div>
              </div>
            </div>
          </div>
          <p class="text-amber-300 text-xs text-center">${category.subtitle}</p>
        `;
        container.appendChild(deckDiv);
      });
    }
    
    function updateCurrentTeamDisplay() {
      const display = document.getElementById('currentTeamDisplay');
      if(display) {
        display.textContent = `Dealing for: ${teams[currentTeamIndex]}`;
      }
    }
    
    async function startDealingProcess() {
      const teamName = teams[currentTeamIndex];
      
      // Show modal with team name
      document.getElementById('modalTeamName').textContent = `Cards for ${teamName}`;
      document.getElementById('dealtCardsContainer').innerHTML = '';
      dealModal.classList.remove('hidden');
      
      // Shuffle animation on decks
      const decks = document.querySelectorAll('.deck-wrapper > div');
      decks.forEach(deck => deck.classList.add('shuffling'));
      
      await delay(1500);
      
      decks.forEach(deck => deck.classList.remove('shuffling'));
      
      // Deal cards one by one
      const dealtCardsContainer = document.getElementById('dealtCardsContainer');
      const currentDealtCards = []; // Array to store the exact cards for the static snapshot
      
      for (let i = 0; i < categoryOrder.length; i++) {
        const catKey = categoryOrder[i];
        const category = cardData[catKey];
        
        // Get a card that hasn't been used yet
        let randomCard;
        let cardKey;
        let attempts = 0;
        
        do {
          const randomIndex = Math.floor(Math.random() * category.cards.length);
          randomCard = category.cards[randomIndex];
          cardKey = `${catKey}-${randomIndex}`;
          attempts++;
        } while (usedCards.has(cardKey) && attempts < 10);
        
        // Mark this card as used and store it for export
        usedCards.add(cardKey);
        currentDealtCards.push({ category, card: randomCard });
        
        await delay(250);
        
        const cardElement = createDealtCard(category, randomCard);
        dealtCardsContainer.appendChild(cardElement);
      }
      
      // Wait for all UI animations to completely finish, then take the clean snapshot
      await delay(2000); 
      captureCards(currentDealtCards);
    }
    
    function createDealtCard(category, card) {
      const div = document.createElement('div');
      div.className = `${category.color} rounded-lg p-8 vintage-border`;
      div.style.animation = `dealCardSmooth 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards`;
      div.innerHTML = `
        <p class="text-amber-300 text-sm font-semibold tracking-widest uppercase mb-2">${category.title}</p>
        <h4 class="title-font text-4xl font-bold text-amber-100 mb-3">${card.title}</h4>
        <p class="text-amber-200 text-xl">${card.desc}</p>
      `;
      return div;
    }
    
    async function captureCards(cardsToExport) {
      const teamName = teams[currentTeamIndex];
      
      // Create an off-screen container for a clean, static, perfectly-formatted export
      const exportDiv = document.createElement('div');
      exportDiv.style.position = 'absolute';
      exportDiv.style.left = '-9999px';
      exportDiv.style.top = '0';
      exportDiv.style.width = '700px'; // Fixed width so it always looks exactly the same
      exportDiv.className = 'parchment-bg rounded-xl p-8 vintage-border text-white';
      
      let cardsHtml = '';
      cardsToExport.forEach(item => {
        cardsHtml += `
          <div class="${item.category.color} rounded-lg p-4 mb-3 vintage-border" style="border: 2px solid #8B5A2B;">
            <p class="text-amber-300 text-xs font-semibold tracking-widest uppercase mb-1">${item.category.title}</p>
            <h4 class="title-font text-2xl font-bold text-amber-100 mb-1">${item.card.title}</h4>
            <p class="text-amber-200 text-base">${item.card.desc}</p>
          </div>
        `;
      });

      exportDiv.innerHTML = `
        <div class="text-center mb-6">
          <h2 class="title-font text-4xl font-bold text-amber-900 mb-2">The Investigation Board</h2>
          <h3 class="title-font text-2xl text-amber-800 italic">Ingredients for: ${teamName}</h3>
        </div>
        <div class="flex flex-col gap-1">
          ${cardsHtml}
        </div>
      `;
      
      // Temporarily append to body to allow html2canvas to read the computed styles
      document.body.appendChild(exportDiv);
      
      try {
        const canvas = await html2canvas(exportDiv, {
          backgroundColor: '#f5e6d3', // Match the parchment background
          scale: 2,                   // High resolution
          logging: false
        });
        
        const link = document.createElement('a');
        link.download = `${teamName}.png`; 
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (error) {
        console.error('Capture failed:', error);
      } finally {
        // Clean up the hidden element
        document.body.removeChild(exportDiv);
      }
    }
    
    function delay(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }
    
    // Initialize team inputs on load
    updateTeamInputs();
  </script>
</body>
</html>
